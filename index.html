<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROLANIA.ES — Libertad Fiscal, Ecosistema 360° y Conserjería VIP en Paraguay</title>
  <meta name="description" content="Agencia 360° de expatriación legal, optimización fiscal, inversión inmobiliaria y concierge VIP en Paraguay para clientes de España, UE, USA y LATAM." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #050811;
      --bg1: #0a0f1d;
      --glass: rgba(255, 255, 255, 0.045);
      --glass-strong: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.09);
      --emerald: #10b981;
      --emerald-glow: rgba(16, 185, 129, 0.35);
      --gold: #f59e0b;
      --gold-glow: rgba(245, 158, 11, 0.3);
      --text: #e8ecf5;
      --muted: #96a1ba;
      --radius: 18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .bg-fx {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(900px 520px at 12% -5%, rgba(16, 185, 129, 0.13), transparent 60%),
        radial-gradient(800px 520px at 88% 18%, rgba(245, 158, 11, 0.07), transparent 60%),
        radial-gradient(1000px 700px at 50% 105%, rgba(16, 185, 129, 0.06), transparent 60%);
    }
    .container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
    section { scroll-margin-top: 96px; }

    /* ---------- HEADER ---------- */
    header {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(8, 12, 24, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1160px; margin: 0 auto; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.5px; text-decoration: none; color: var(--text); }
    .logo span { color: var(--emerald); }
    nav { display: flex; gap: 28px; align-items: center; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
    nav a:hover { color: var(--emerald); }
    .lang-switch {
      display: flex; align-items: center; gap: 4px;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 10px;
    }
    .lang-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-family: inherit; font-size: 0.85rem; font-weight: 700; padding: 4px 8px; border-radius: 999px;
      transition: all 0.2s;
    }
    .lang-btn.active { background: var(--emerald); color: #04120c; }
    .lang-sep { color: rgba(255, 255, 255, 0.25); }

    /* ---------- HERO ---------- */
    .hero { padding: 110px 0 90px; text-align: center; }
    .badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
    .badge {
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 999px; padding: 8px 18px; font-size: 0.85rem; font-weight: 600; color: var(--text);
      backdrop-filter: blur(8px);
    }
    .badge.gold { border-color: rgba(245, 158, 11, 0.4); color: var(--gold); }
    .hero h1 {
      font-size: clamp(2.2rem, 5.5vw, 3.8rem); font-weight: 900; line-height: 1.12;
      letter-spacing: -1.5px; max-width: 900px; margin: 0 auto 22px;
      background: linear-gradient(120deg, #fff 30%, var(--emerald) 75%, var(--gold));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { max-width: 780px; margin: 0 auto 38px; color: var(--muted); font-size: 1.15rem; }
    .cta-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none;
      font-weight: 700; font-size: 1rem; padding: 15px 30px; border-radius: 14px;
      transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: none; font-family: inherit;
    }
    .btn:hover { transform: translateY(-3px); }
    .btn-primary { background: linear-gradient(135deg, #10b981, #0d9e6e); color: #03130c; box-shadow: 0 8px 30px var(--emerald-glow); }
    .btn-primary:hover { box-shadow: 0 12px 40px var(--emerald-glow); }
    .btn-ghost { background: var(--glass); border: 1px solid var(--border); color: var(--text); backdrop-filter: blur(8px); }
    .btn-ghost:hover { border-color: var(--emerald); color: var(--emerald); }
    .btn-gold { background: var(--glass); border: 1px solid rgba(245, 158, 11, 0.45); color: var(--gold); }
    .btn-gold:hover { box-shadow: 0 8px 30px var(--gold-glow); }

    /* ---------- SECTION HEADERS ---------- */
    .section { padding: 80px 0; }
    .over {
      display: inline-block; font-size: 0.75rem; font-weight: 800; letter-spacing: 2.5px;
      color: var(--emerald); background: var(--glass); border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 16px; margin-bottom: 18px; text-transform: uppercase;
    }
    .section h2 { font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 800; letter-spacing: -0.8px; margin-bottom: 12px; }
    .section .sub { color: var(--muted); max-width: 740px; font-size: 1.05rem; }
    .center { text-align: center; }
    .center .sub { margin: 0 auto; }

    /* ---------- VALUE GRID ---------- */
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-top: 44px; }
    .card {
      background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px 28px; backdrop-filter: blur(12px);
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .card:hover { transform: translateY(-6px); border-color: rgba(16, 185, 129, 0.45); box-shadow: 0 16px 44px rgba(0, 0, 0, 0.4); }
    .card .icon { font-size: 2rem; margin-bottom: 16px; }
    .card h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; color: var(--gold); }
    .card p { color: var(--muted); font-size: 0.95rem; }

    /* ---------- ECOSYSTEM 360 (4 PILARES INFOGRÁFICOS) ---------- */
    .pillar {
      position: relative; margin-top: 44px;
      background: var(--glass); border: 1px solid var(--border); border-radius: 24px;
      padding: 40px 36px; backdrop-filter: blur(12px); overflow: hidden;
    }
    .pillar::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: linear-gradient(180deg, var(--emerald), var(--gold));
    }
    .pillar-head { display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
    .pillar-num {
      font-size: 2.8rem; font-weight: 900; line-height: 1; letter-spacing: -2px;
      background: linear-gradient(135deg, var(--emerald), var(--gold));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      min-width: 74px;
    }
    .pillar-head h3 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.3px; color: #fff; }
    .pillar-head p { color: var(--muted); font-size: 0.95rem; margin-top: 4px; max-width: 600px; }
    .pillar-tags { margin-left: auto; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .phase-chip {
      font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; color: var(--gold);
      border: 1px solid rgba(245, 158, 11, 0.4); border-radius: 999px; padding: 4px 12px;
    }
    .tag-chip {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; color: var(--emerald);
      border: 1px solid rgba(16, 185, 129, 0.4); border-radius: 999px; padding: 4px 12px; text-transform: uppercase;
    }
    .svc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
    .svc {
      background: rgba(255, 255, 255, 0.025); border: 1px solid var(--border); border-radius: 18px;
      padding: 24px 22px; display: flex; flex-direction: column; gap: 12px;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .svc:hover { transform: translateY(-5px); border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45); }
    .svc-top { display: flex; align-items: center; justify-content: space-between; }
    .svc-icon { font-size: 1.6rem; }
    .svc-n {
      font-size: 0.75rem; font-weight: 800; color: var(--muted); letter-spacing: 1px;
      border: 1px solid var(--border); border-radius: 999px; padding: 2px 10px;
    }
    .svc h4 { font-size: 1.05rem; font-weight: 700; line-height: 1.35; color: #fff; }
    .svc p { color: var(--muted); font-size: 0.9rem; flex: 1; line-height: 1.5; }
    .svc-badge {
      align-self: flex-start; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.8px;
      border-radius: 999px; padding: 4px 12px; text-transform: uppercase;
      background: rgba(16, 185, 129, 0.14); color: var(--emerald); border: 1px solid rgba(16, 185, 129, 0.4);
    }
    .svc-badge.gold { background: rgba(245, 158, 11, 0.12); color: var(--gold); border-color: rgba(245, 158, 11, 0.45); }

    /* ---------- SIMULATOR NATIVO ---------- */
    .sim-panel {
      max-width: 1040px; margin: 44px auto 0;
      background: var(--glass-strong); border: 1px solid var(--border); border-radius: 24px;
      padding: 44px 42px; backdrop-filter: blur(16px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }
    .sim-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 8px; }
    .field label { display: block; font-size: 0.88rem; font-weight: 700; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.3px; }
    select, input[type=number] {
      width: 100%; background: rgba(5, 8, 17, 0.8); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-family: inherit; font-size: 1rem; padding: 14px 16px; outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input[type=number]:focus { border-color: var(--emerald); }
    .income-row { display: flex; gap: 16px; align-items: center; }
    input[type=range] {
      -webkit-appearance: none; appearance: none; flex: 1; height: 6px; border-radius: 999px; outline: none;
      background: rgba(255, 255, 255, 0.12); cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: #fff; border: 5px solid var(--emerald);
      box-shadow: 0 0 16px var(--emerald-glow); cursor: grab;
    }
    input[type=number] { width: 130px; flex-shrink: 0; text-align: center; font-weight: 700; }
    .checks { display: flex; flex-direction: column; gap: 16px; margin: 26px 0 8px; }
    .check {
      display: flex; gap: 14px; align-items: flex-start;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: border-color 0.2s;
    }
    .check:hover { border-color: rgba(16, 185, 129, 0.4); }
